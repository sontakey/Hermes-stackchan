# Hermes MCP config snippet for the stackchan-mcp gateway.
#
# Add this block to ~/.hermes/config.yaml (top level). Hermes spawns the
# gateway as a stdio MCP server at startup and registers its tools as
# mcp_stackchan_<tool> (e.g. mcp_stackchan_say, mcp_stackchan_move_head).
#
# Note: stackchan-hermes' OWN apps talk to the gateway directly over stdio
# (see stackchan_hermes/client.py); this block is for letting the Hermes
# AGENT itself call the robot's tools in conversation. Both can coexist as
# long as only one owner runs the gateway at a time (see README).

mcp_servers:
  stackchan:
    # Point at the gateway's console script (zero subcommand = stdio MCP server).
    command: "/path/to/stackchan-mcp/.venv/bin/stackchan-mcp"
    args: []
    env:
      # This host's LAN IP, so take_photo callbacks reach the gateway.
      # Find it with: ipconfig getifaddr en0
      VISION_HOST: "<YOUR_MAC_LAN_IP>"
      #
      # --- Gateway Token (OPTIONAL) ---------------------------------------
      # ONLY set this if the device has a Gateway Token. If the device has NO
      # token (common), setting STACKCHAN_TOKEN here makes the gateway REJECT
      # the device. Leave it commented for a token-less device, or set the
      # SAME value on both sides.
      # STACKCHAN_TOKEN: "<YOUR_TOKEN>"          # MUST match the device's token
      #
      # --- Non-default ports (OPTIONAL) -----------------------------------
      # Only if 8765/8766 are taken on this host. If you set WS_PORT, the
      # device's NVS websocket.url MUST use the same port (ws://host:8865/).
      # WS_PORT: "8865"
      # CAPTURE_PORT: "8866"
      #
      # STACKCHAN_VOICEVOX_URL: "http://127.0.0.1:50021"  # default; override if needed
    enabled: true
    timeout: 120
    connect_timeout: 60
